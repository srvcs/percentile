schemaVersion: 1
name: "srvcs-percentile"
slug: "percentile"
repository: "srvcs/percentile"
package: "srvcs-percentile"
function: "comparison: p-th percentile of a list (linear interpolation)"
kind: "orchestrator"
categories:
  - "comparison"
dependencies:
  - slug: "sortascending"
    service: "srvcs-sortascending"
  - slug: "floatadd"
    service: "srvcs-floatadd"
  - slug: "floatmultiply"
    service: "srvcs-floatmultiply"
  - slug: "floatsubtract"
    service: "srvcs-floatsubtract"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "values"
    type: "json[]"
    required: true
  - name: "p"
    type: "number"
    required: true
outputs:
  - name: "values"
    type: "json[]"
  - name: "p"
    type: "number"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATADD_URL"
    default: "http://127.0.0.1:8091"
    purpose: "Base URL for srvcs-floatadd"
  - name: "SRVCS_FLOATMULTIPLY_URL"
    default: ""
    purpose: "Base URL for srvcs-floatmultiply"
  - name: "SRVCS_FLOATSUBTRACT_URL"
    default: ""
    purpose: "Base URL for srvcs-floatsubtract"
  - name: "SRVCS_SORTASCENDING_URL"
    default: ""
    purpose: "Base URL for srvcs-sortascending"
